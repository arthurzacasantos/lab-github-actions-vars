name: Lab GitHub Actions Variáveis

on:
  push:
    branches:
      - main

jobs:
  exemplo-variaveis:
    runs-on: ubuntu-latest

    env:
      APP_NAME: MeuApp
      BUILD_VERSION: 1.0

    steps:
      - name: "Passo 1: Variáveis em Escopos Diferentes"
        run: |
          echo "App: $APP_NAME"
          echo "Versão: $BUILD_VERSION"

      - name: "Passo com variável de Step"
        env:
          STEP_TEMP: TEMP123
        run: |
          echo "Variável temporária: $STEP_TEMP"

      - name: "Passo 2: Observando o Escopo da STEP_TEMP"
        run: |
          echo "App: $APP_NAME"
          echo "Versão: $BUILD_VERSION"
          echo "Step temp: $STEP_TEMP"

      - name: "Passo 3: Criando variável dinâmica com GITHUB_ENV"
        run: |
          echo "NOVA_VARIAVEL=GeradaNoWorkflow" >> $GITHUB_ENV

      - name: "Passo 4: Usando variável dinâmica"
        run: |
          echo "Nova variável: $NOVA_VARIAVEL"

      - name: "Passo 5: Variáveis padrão do GitHub"
        run: |
          echo "Usuário: $GITHUB_ACTOR"
          echo "Repositório: $GITHUB_REPOSITORY"
          echo "Sistema: $RUNNER_OS"

      - name: "Passo 6: Usando Secrets e Variables"
        run: |
          echo "URL ambiente: ${{ vars.URL_AMBIENTE }}"
          echo "Token (oculto): ${{ secrets.API_TOKEN_PROD }}"
